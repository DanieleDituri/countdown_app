<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Sfondo bianco (light) — Xcode genera le varianti dark/tinted da questo -->
  <rect width="1024" height="1024" rx="230" fill="#FFFFFF"/>

  <!-- Cerchio track -->
  <circle cx="512" cy="490" r="330" fill="none" stroke="#E5E5EA" stroke-width="60"/>

  <!-- Arco countdown (circa 70% del cerchio) -->
  <circle cx="512" cy="490" r="330"
    fill="none"
    stroke="#007AFF"
    stroke-width="60"
    stroke-dasharray="1452 2073"
    stroke-dashoffset="518"
    stroke-linecap="round"
    transform="rotate(-90 512 490)"/>

  <!-- Pallino all'inizio dell'arco -->
  <circle cx="512" cy="160" r="36" fill="#007AFF"/>

  <!-- Numero giorni -->
  <text x="512" y="440"
    text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="260"
    font-weight="700"
    fill="#007AFF">7</text>

  <!-- Label DAYS -->
  <text x="512" y="560"
    text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="100"
    font-weight="600"
    fill="#007AFF"
    letter-spacing="14">DAYS</text>
</svg>
