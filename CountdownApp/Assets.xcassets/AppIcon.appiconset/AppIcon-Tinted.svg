<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Variante Tinted: usa scala di grigi — il sistema applica il colore d'accento dell'utente -->
  <rect width="1024" height="1024" rx="230" fill="#1C1C1E"/>
  <circle cx="512" cy="490" r="330" fill="none" stroke="#3A3A3C" stroke-width="60"/>
  <circle cx="512" cy="490" r="330"
    fill="none" stroke="#FFFFFF" stroke-width="60"
